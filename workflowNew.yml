name: Java CI

on:
  push:
    branches: [ "main", "testCalculadora" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Download JUnit
      run: |
        mkdir libs
        curl -L -o libs/junit.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar

    - name: Compile
      run: |
        mkdir -p out
        javac -cp libs/junit.jar -d out $(find . -name "*.java")

    - name: Run tests
      run: |
        java -jar libs/junit.jar --class-path out --scan-class-path
