name: Java CI Simple

on:
  push:
    branches: [ "main", "testCalculadora" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Compile Java
      run: |
        mkdir -p out
        javac -d out $(find . -name "*.java")

    - name: Run program (solo comprobación)
      run: |
        echo "Compilación OK"
