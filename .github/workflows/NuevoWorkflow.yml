name: Java CI with JUnit

on:
  push:
    branches: [ "main", "testCalculadora" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Download JUnit 5
      run: |
        mkdir libs
        curl -L -o libs/junit-platform-console-standalone.jar \
        https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar

    - name: Compile Java files
      run: |
        mkdir -p out
        javac -cp libs/junit-platform-console-standalone.jar -d out $(find . -name "*.java")

    - name: Run JUnit tests
      run: |
        java -jar libs/junit-platform-console-standalone.jar \
        --class-path out \
        --scan-class-path
