name: Test JUnit Java1

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Clonar repositorio
      - name: Checkout
        uses: actions/checkout@v3

      # Configurar Java 17
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # Descargar JUnit
      - name: Descargar JUnit
        run: wget https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.9.3/junit-platform-console-standalone-1.9.3.jar

      # Compilar código
      - name: Compilar codigo
        run: |
          mkdir -p out
          javac -cp junit-platform-console-standalone-1.9.3.jar -d out $(find src test -name "*.java")

      # Ejecutar tests
      - name: Ejecutar tests
        run: |
          java -jar junit-platform-console-standalone-1.9.3.jar --class-path out --scan-classpath
